<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | ワンタッチ管理</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#f7f7f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border:1px solid #d9d9d9;padding:48px 40px;width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:32px;}
.logo img{width:72px;height:72px;}
.logo p{font-size:13px;color:#8a8a8a;margin-top:10px;letter-spacing:.05em;}
.field{margin-bottom:20px;}
.label{display:block;font-size:12px;font-weight:700;color:#2a2a2a;margin-bottom:6px;letter-spacing:.05em;}
.input-wrap{position:relative;}
input[type=text],input[type=password]{width:100%;padding:11px 14px;border:1px solid #d9d9d9;font-size:14px;color:#111;outline:none;font-family:'Noto Sans JP',sans-serif;background:#fff;transition:border .15s;}
input:focus{border-color:#111;}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8a8a8a;padding:4px;line-height:0;}
.err{background:#fff0ee;border:1px solid #d4380d;color:#d4380d;padding:10px 14px;font-size:13px;margin-bottom:20px;display:none;}
.err.show{display:block;}
.btn-login{width:100%;padding:14px;background:#111;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.1em;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s;margin-top:4px;}
.btn-login:hover{opacity:.85;}
.register-link{text-align:center;margin-top:20px;font-size:13px;color:#8a8a8a;}
.register-link a{color:#d4380d;text-decoration:none;font-weight:700;}
.hint{text-align:center;font-size:12px;color:#8a8a8a;margin-top:12px;line-height:1.8;}
.footer{text-align:center;margin-top:32px;font-size:11px;color:#8a8a8a;letter-spacing:.05em;}
.footer a{color:#8a8a8a;margin:0 6px;}
.footer a:hover{color:#d4380d;}
</style>
</head>
<body>
<div>
  <div class="card">
    <div class="logo">
      <img src="icon-192.png" alt="ワンタッチ管理">
      <p>ワンタッチ管理システム</p>
    </div>

    <div class="err" id="errMsg"></div>

    <div class="field">
      <label class="label">ログインID</label>
      <div class="input-wrap">
        <input type="text" id="userId" placeholder="例：TAMJ-tanaka" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label class="label">パスワード</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="パスワードを入力" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw()">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()">ログイン</button>

    <div class="register-link">
      まだ登録していない方は<a href="register.html">こちらから会社登録</a>
    </div>
    <div class="hint">アカウントマスタで登録されたログインIDと<br>パスワードを入力してください</div>
  </div>

  <div class="footer">
    <a href="https://tamjump.com/terms.html" target="_blank">利用規約</a>
    <a href="https://tamjump.com/privacy.html" target="_blank">プライバシーポリシー</a><br>
    <span style="margin-top:8px;display:inline-block;">© TAMJ / OneTouch Management. All rights reserved.</span>
  </div>
</div>

<script>
function showErr(msg) {
  var el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideErr() {
  document.getElementById('errMsg').classList.remove('show');
}
function togglePw() {
  var inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  hideErr();
  var id  = document.getElementById('userId').value.trim();
  var pw  = document.getElementById('password').value;

  if (!id) { showErr('ログインIDを入力してください'); return; }
  if (!pw) { showErr('パスワードを入力してください'); return; }

  // システム管理者（固定）
  if (id === 'admin' && pw === 'admin') {
    login({ id:'admin', name:'システム管理者', role:'system_admin',
            companyCode:'SYSTEM', companyName:'ワンタッチ管理運営',
            officeCode:'', officeName:'', plan:'pro', isDemoMode:false });
    return;
  }

  // 登録済みアカウント
  var accounts = [];
  try { accounts = JSON.parse(localStorage.getItem('accounts') || '[]'); } catch(e) {}

  var user = findAccount(id, pw, accounts);

  // 管理会社アカウント
  if (!user) {
    var partners = [];
    try { partners = JSON.parse(localStorage.getItem('partners') || '[]'); } catch(e) {}
    user = findPartner(id, pw, partners);
  }

  if (!user) {
    showErr('ログインIDまたはパスワードが正しくありません');
    return;
  }

  login(user);
}

function findAccount(id, pw, accounts) {
  var dash = id.indexOf('-');
  var cc   = dash > 0 ? id.substring(0, dash).toUpperCase() : '';
  var un   = dash > 0 ? id.substring(dash + 1) : id;
  return accounts.find(function(a) {
    if (a.password !== pw) return false;
    if (a.status && a.status !== 'active') return false;
    if (cc) return a.companyCode === cc && (a.loginName === un || a.id === id);
    return a.id === id || a.loginName === id;
  }) || null;
}

function findPartner(id, pw, partners) {
  for (var i = 0; i < partners.length; i++) {
    var p = partners[i];
    var cs = p.contacts || [];
    if (cs.length > 0) {
      for (var j = 0; j < cs.length; j++) {
        if (cs[j].loginId === id && cs[j].password === pw) {
          return { id:cs[j].loginId, name:cs[j].name, role:'contractor',
            companyCode:p.partnerCode||p.id, companyName:p.name,
            partnerId:p.id, partnerCode:p.partnerCode,
            categories:p.categories||[], assignedCompanies:p.assignedCompanies||[],
            plan:'free', isDemoMode:false };
        }
      }
    } else if (p.loginId === id && p.password === pw) {
      return { id:p.loginId, name:p.contactName||p.name, role:'contractor',
        companyCode:p.partnerCode||p.id, companyName:p.name,
        partnerId:p.id, partnerCode:p.partnerCode,
        categories:p.categories||[], assignedCompanies:p.assignedCompanies||[],
        plan:'free', isDemoMode:false };
    }
  }
  return null;
}

function login(user) {
  var info = {
    id:user.id, userId:user.id, name:user.name, role:user.role,
    companyCode:user.companyCode||'', companyName:user.companyName||'',
    officeCode:user.officeCode||'', officeName:user.officeName||'',
    partnerId:user.partnerId||'', partnerCode:user.partnerCode||'',
    categories:user.categories||[], assignedCompanies:user.assignedCompanies||[],
    plan:user.plan||'free', isDemoMode:false, isFirstLogin:!!user.isFirstLogin
  };
  sessionStorage.setItem('currentUser', JSON.stringify(info));
  localStorage.setItem('ONE_loggedIn','1');
  localStorage.setItem('ONE_userId', user.id);
  if (user.role === 'contractor') {
    sessionStorage.setItem('currentContractor', JSON.stringify(info));
  }

  var routes = {
    system_admin:'system-admin.html',
    company_admin:'master-top.html',
    office_admin:'master-top.html',
    staff:'report.html',
    contractor:'contractor-dashboard.html'
  };
  window.location.href = routes[user.role] || 'report.html';
}

// Enterキー対応
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// 既ログイン済みリダイレクト
(function() {
  try {
    var u = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
    if (u && u.role) {
      var routes = {system_admin:'system-admin.html',company_admin:'master-top.html',
        office_admin:'master-top.html',staff:'report.html',contractor:'contractor-dashboard.html'};
      window.location.href = routes[u.role] || 'report.html';
    }
  } catch(e) {}
})();

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
